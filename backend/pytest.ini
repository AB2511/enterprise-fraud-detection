[pytest]
minversion = 7.0
addopts = 
    -ra
    -q
    --strict-markers
testpaths = tests
pythonpath = .
asyncio_mode = auto

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, API)
    e2e: End-to-end tests (full workflows)
    slow: Slow tests (skip with -m "not slow")

[coverage:run]
source = src
omit =
    */tests/*
    */migrations/*
    */__init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    @abstractmethod
    @abc.abstractmethod
