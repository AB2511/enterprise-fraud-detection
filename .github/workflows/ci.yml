name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          # Install linting tools only (skip database dependencies that cause issues)
          pip install ruff==0.1.0 black==23.12.0

      - name: Run Ruff
        working-directory: ./backend
        run: ruff check src/ tests/

      - name: Run Black
        working-directory: ./backend
        run: black --check src/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: fraud_password
          POSTGRES_DB: fraud_detection_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          # Install core dependencies without problematic psycopg2-binary
          pip install fastapi==0.109.0 uvicorn==0.27.0 pydantic==2.5.0 || pip install fastapi uvicorn pydantic
          pip install pydantic-settings==2.1.0 sqlalchemy==2.0.25 alembic==1.13.0 || pip install pydantic-settings sqlalchemy alembic
          pip install asyncpg==0.29.0 || pip install asyncpg
          pip install python-json-logger==2.0.7 structlog==24.1.0 || pip install python-json-logger structlog
          # Install test dependencies
          pip install pytest==7.4.0 pytest-asyncio==0.23.0 pytest-cov==4.1.0 || pip install pytest pytest-asyncio pytest-cov
          pip install pytest-mock==3.12.0 httpx==0.26.0 faker==22.0.0 || pip install pytest-mock httpx faker

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://fraud_user:fraud_password@localhost:5432/fraud_detection_test
        run: pytest --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
